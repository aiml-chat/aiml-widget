name: Build & Size Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Bundle size report
        run: npm run size
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: widget-dist
          path: dist/
